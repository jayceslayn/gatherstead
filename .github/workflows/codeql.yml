name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan (Mondays 06:17 UTC) so newly-published queries catch existing code, not just diffs.
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write # required to upload CodeQL results to the Security tab
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
          - language: javascript-typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Buildless (build-mode: none) analysis avoids pinning/booting the .NET 10 SDK or the Nuxt
      # toolchain just to scan — CodeQL extracts source directly. Keeps the SAST gate independent of
      # the build jobs and fast on PRs.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
