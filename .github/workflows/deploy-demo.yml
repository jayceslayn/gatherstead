name: Deploy Demo Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: '11.5.0'

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
          cache-dependency-path: src/Gatherstead.Web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: src/Gatherstead.Web
        run: pnpm install --frozen-lockfile

      - name: Generate static demo site
        working-directory: src/Gatherstead.Web
        env:
          NUXT_PUBLIC_DEMO_MODE: 'true'
          # Demo App Insights (gat-ai-demo-*) — populate from the bicep
          # demoAppInsightsConnectionString output. Ingestion-only; safe to bake into the static build.
          NUXT_PUBLIC_APPINSIGHTS_CONNECTION_STRING: ${{ secrets.DEMO_APPINSIGHTS_CONNECTION_STRING }}
        run: pnpm generate

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: src/Gatherstead.Web/.output/public
          skip_app_build: true
