allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true

overrides:
  "esbuild": ">=0.28.1"
  # Overrides shadow the direct dependency too, so keep this floor in step with package.json.
  serialize-javascript: ">=7.0.7 <8"
  node-forge: ">=1.4.0"
  "picomatch@2": "^2.3.2"
  "picomatch@4": "^4.0.4"
  lodash: ">=4.17.24"
  defu: ">=6.1.5"
  # Must stay on the 7.x line: nuxt pins vite 7.3.3, @nuxt/vite-builder wants ^7.3.3, and vitest
  # caps at ^7. Unbounded, this override forced vite 8 on all three.
  vite: ">=7.3.2 <8"
  h3: ">=1.15.9"
  # @redocly/openapi-core (via openapi-typescript) pins js-yaml to an exact 4.1.1; every other
  # consumer already floats to 4.2.0. Must stay on the 4.x line: 5.x is a breaking API change.
  js-yaml: ">=4.2.0 <5"
  srvx: ">=0.11.13"
  # Must stay on the 2.x line: nuxt and @unhead/vue both depend on unhead ^2, and v3 removed the
  # hooks.hookOnce API that @nuxt/ui calls. Unbounded, this override silently pulls in v3.
  unhead: ">=2.1.13 <3"
  postcss: ">=8.5.10"
  simple-git: ">=3.36.0"
  nitropack: ">=2.13.4"
  devalue: ">=5.8.1"
  "brace-expansion@5": ">=5.0.6"
  ws: ">=8.20.1"
  shell-quote: ">=1.8.4"
  # happy-dom < 20.8.9 has critical VM-escape RCE + related advisories. It is only an optional peer
  # of vitest/@nuxt/test-utils (our tests run in the node environment and never load it); pin the
  # patched line. Consumers' peer range is '*', so this satisfies them. Drop once a consumer pins past it.
  happy-dom: ">=20.8.9"
